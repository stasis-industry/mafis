name: Feature Request
description: Suggest an improvement or new capability
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! Please describe your use case so we can understand the motivation.

  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: What problem are you trying to solve? What research question does this enable?
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed Solution
      description: How would you like this to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What workarounds or alternative approaches have you tried?

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - New solver / algorithm
        - Fault model
        - Analysis / metrics
        - Visualization
        - Export / data pipeline
        - Topology / map
        - Performance
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Papers, references, screenshots, or anything else relevant
