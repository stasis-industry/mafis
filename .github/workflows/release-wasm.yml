name: Release WASM

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-release:
    name: Build WASM & Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libudev-dev \
            libxkbcommon-dev \
            libwayland-dev \
            pkg-config

      - name: Install wasm-bindgen-cli
        run: cargo install wasm-bindgen-cli

      - name: Run tests
        run: cargo test

      - name: Build WASM (release)
        run: cargo build --release --target wasm32-unknown-unknown

      - name: Generate JS bindings
        run: |
          wasm-bindgen --out-dir wasm-dist --target web \
            target/wasm32-unknown-unknown/release/mafis.wasm

      - name: Package WASM artifacts
        run: tar -czf mafis-wasm.tar.gz -C wasm-dist .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            mafis-wasm.tar.gz
          generate_release_notes: true

      - name: Trigger website rebuild
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.WEBSITE_DISPATCH_TOKEN }}" \
            https://api.github.com/repos/stasis-industry/stasis-website/dispatches \
            -d '{"event_type":"wasm-updated","client_payload":{"tag":"${{ github.ref_name }}"}}'
